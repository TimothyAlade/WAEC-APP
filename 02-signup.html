<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - WAEC Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 400px; margin: auto; padding: 80px 20px; }
        .card { background: white; border-radius: 30px; padding: 40px; text-align: center; }
        h1 { color: #764ba2; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        input:focus { outline: none; border-color: #764ba2; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #764ba2, #667eea); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .link { margin-top: 20px; display: block; color: #764ba2; text-decoration: none; }
        .error { color: #f44336; margin-top: 10px; font-size: 14px; }
        .success { color: #4CAF50; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 Sign Up</h1>
            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password (min 6 characters)">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
            <button onclick="signup()">Create Account</button>
            <a href="01-login.html" class="link">Already have an account? Login</a>
            <a href="00-index.html" class="link">← Back to Home</a>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </div>
    </div>
    
    <script>
        function getUsers() {
            let users = localStorage.getItem('waec_users');
            return users ? JSON.parse(users) : [];
        }
        
        function saveUsers(users) {
            localStorage.setItem('waec_users', JSON.stringify(users));
        }
        
        function signup() {
            let name = document.getElementById('name').value.trim();
            let email = document.getElementById('email').value.trim();
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear previous messages
            document.getElementById('error').innerText = '';
            document.getElementById('success').innerText = '';
            
            // Validation
            if (!name) {
                document.getElementById('error').innerText = "Please enter your full name";
                return;
            }
            if (!email) {
                document.getElementById('error').innerText = "Please enter your email address";
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                document.getElementById('error').innerText = "Please enter a valid email address";
                return;
            }
            if (!password) {
                document.getElementById('error').innerText = "Please enter a password";
                return;
            }
            if (password.length < 6) {
                document.getElementById('error').innerText = "Password must be at least 6 characters";
                return;
            }
            if (password !== confirmPassword) {
                document.getElementById('error').innerText = "Passwords do not match";
                return;
            }
            
            let users = getUsers();
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                document.getElementById('error').innerText = "Email already registered. Please login.";
                return;
            }
            
            // Create new user
            let newUser = {
                id: Date.now(),
                name: name,
                email: email,
                password: password,
                isPremium: false,
                premiumExpiry: null,
                streak: 0,
                lastActive: new Date().toDateString(),
                weakTopics: {},
                completedChapters: {},
                chapterAttempts: {},
                chapterScores: {},
                totalQuestions: 0,
                totalCorrect: 0,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveUsers(users);
            
            // Auto login after signup
            let currentUser = {
                id: newUser.id,
                name: newUser.name,
                email: newUser.email,
                isPremium: false,
                streak: 0,
                lastActive: new Date().toDateString(),
                weakTopics: {},
                completedChapters: {},
                chapterAttempts: {},
                chapterScores: {},
                totalQuestions: 0,
                totalCorrect: 0
            };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            document.getElementById('success').innerText = "Account created successfully! Redirecting...";
            setTimeout(() => {
                window.location.href = "03-dashboard.html";
            }, 1500);
        }
    </script>
</body>
</html>
