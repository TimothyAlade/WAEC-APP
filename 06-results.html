<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - WAEC Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f7fb; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 15px 20px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #f9a826; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .result-card { background: white; border-radius: 25px; padding: 30px; margin-bottom: 20px; text-align: center; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; }
        .question-review { background: #f9f9f9; border-radius: 15px; padding: 20px; margin: 15px 0; text-align: left; }
        .question-text { font-weight: bold; margin-bottom: 10px; }
        .user-answer { padding: 10px; border-radius: 8px; margin: 5px 0; }
        .correct { background: #e8f5e9; color: #2e7d32; }
        .incorrect { background: #ffebee; color: #c62828; }
        .explanation { background: #e3f2fd; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 14px; }
        .btn { padding: 12px 25px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; margin: 5px; display: inline-block; text-decoration: none; }
        .btn-primary { background: linear-gradient(135deg, #764ba2, #667eea); color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-premium { background: #f9a826; color: #1a1a2e; }
        .weak-area { background: #fff3e0; padding: 15px; border-radius: 15px; margin-top: 20px; text-align: left; }
        @media (max-width: 600px) { .container { padding: 15px; } .result-card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WAEC <span>Master</span></div>
    </div>
    
    <div class="container" id="container"></div>
    
    <script>
        let results = JSON.parse(localStorage.getItem('practiceResults'));
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        function render() {
            if (!results) {
                document.getElementById('container').innerHTML = '<div class="result-card"><h2>No results found</h2><a href="03-dashboard.html" class="btn btn-primary">Go to Dashboard</a></div>';
                return;
            }
            
            let percentage = results.score;
            let grade = percentage >= 80 ? 'Excellent!' : (percentage >= 60 ? 'Good!' : (percentage >= 40 ? 'Fair' : 'Needs Improvement'));
            let color = percentage >= 80 ? '#4CAF50' : (percentage >= 60 ? '#ff9800' : '#f44336');
            
            let html = `
                <div class="result-card">
                    <h2>📊 Practice Results</h2>
                    <div class="score-circle" style="background: conic-gradient(${color} 0deg ${percentage * 3.6}deg, #e0e0e0 ${percentage * 3.6}deg 360deg); line-height: 150px;">${percentage}%</div>
                    <div><strong>${grade}</strong><br>You got ${results.correct} out of ${results.total} correct<br>Time: ${Math.floor(results.timeSpent / 60)}:${(results.timeSpent % 60).toString().padStart(2, '0')}</div>
                    
                    ${!currentUser?.isPremium ? `
                        <div style="background: #fff3e0; padding: 15px; border-radius: 15px; margin: 15px 0;">
                            🔒 <strong>Upgrade to Premium</strong> to get brand new questions every retry!<br>
                            <a href="07-upgrade.html" class="btn btn-premium" style="margin-top: 10px;">Upgrade Now - ₦2,500/month</a>
                        </div>
                    ` : `
                        <div style="background: #e8f5e9; padding: 15px; border-radius: 15px; margin: 15px 0;">
                            ⭐ Premium Active! Retry to get BRAND NEW questions!
                        </div>
                    `}
                    
                    <div>
                        <a href="05-practice.html?subject=${results.subjectId}&chapter=${results.chapterNum}&topic=${encodeURIComponent(results.topicName)}&retry=true" class="btn btn-primary">🔄 Retry Chapter ${currentUser?.isPremium ? '(New Questions!)' : ''}</a>
                        <a href="04-subject.html?id=${results.subjectId}" class="btn btn-secondary">← Back to Chapters</a>
                        <a href="03-dashboard.html" class="btn btn-secondary">🏠 Dashboard</a>
                    </div>
                </div>
                
                <div class="result-card">
                    <h3>📝 Detailed Review & Explanations</h3>
                    ${results.detailedResults.map((r, i) => `
                        <div class="question-review">
                            <div class="question-text">${i+1}. ${r.question}</div>
                            <div class="user-answer ${r.isCorrect ? 'correct' : 'incorrect'}">
                                Your answer: ${r.userAnswer}
                                ${!r.isCorrect ? `<br>✓ Correct answer: ${r.correctAnswer}` : ''}
                            </div>
                            <div class="explanation">💡 ${r.explanation}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // Show weak areas
            if (currentUser?.weakTopics) {
                let weakAreas = Object.entries(currentUser.weakTopics)
                    .filter(([_, data]) => data.accuracy < 60)
                    .sort((a, b) => a[1].accuracy - b[1].accuracy);
                
                if (weakAreas.length > 0) {
                    html += `<div class="weak-area">
                        <h4>⚠️ Topics to Focus On:</h4>
                        ${weakAreas.map(([topic, data]) => `
                            <div style="margin: 10px 0;">
                                <strong>📚 ${topic}</strong> - Accuracy: ${data.accuracy}% (${data.attempts} attempts)
                                <div style="background:#e0e0e0; border-radius:10px; height:8px; margin-top:5px;">
                                    <div style="width:${data.accuracy}%; background:#ff9800; height:8px; border-radius:10px;"></div>
                                </div>
                            </div>
                        `).join('')}
                        <p style="margin-top: 10px;">💡 Practice these topics to improve your overall score!</p>
                    </div>`;
                }
            }
            
            document.getElementById('container').innerHTML = html;
        }
        
        render();
    </script>
</body>
</html>
